<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Supplier Registration</title>

</head>
<body class="d-flex flex-column min-vh-100" style="margin: 0; padding: 0; background-color: #f1f3f5;">
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="supplierReg.html">Supplier Registration</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="salesReg.html">Sales Registration</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="stockReg.html">Stock Registration</a>
                    </li>
                   

                </ul>
            </div>
        </div>
    </nav>


    <div class="container mt-5 mb-2">
      <div class="card shadow-sm mb-0 mx-auto" style="max-width: 640px; width: 100%;">
        <div class="card-body py-4 px-4">
          <h1 class="text-center mb-3">Stock Registration</h1>
          <form class="row g-3">
              <div class="col-md-6">
                  <label for="inputEmail4" class="form-label">Name</label>
                  <input type="text" class="form-control" id="inputEmail4">
              </div>
              <div class="col-md-6">
                  <label for="inputStockType" class="form-label">Stock Type</label>
                  <input type="text" class="form-control" id="inputStockType">
              </div>
                <div class="col-md-6">
                  <label for="inputDate" class="form-label"> Manufactured Date</label>
                  <input type="text" class="form-control" id="inputDate">
              </div>
              <div class="col-md-6">
                  <label for="ExpiryDate" class="form-label">Expiry Date</label>
                  <input type="text" class="form-control" id="ExpiryDate">
              </div>
               <div class="col-md-6">
                  <label for="supplierName" class="form-label">Supplier name</label>
                  <input type="email" class="form-control" id="supplierName">
              </div>
              
                <div class="col-md-6">
                  <label for="inputSupplierId" class="form-label">Supplier Id</label>
                  <input type="text" class="form-control" id="inputSupplierId">
              </div>
              <div class="col-12">
                  <label for="inputStockdescription" class="form-label">Detailed Stock Description</label>
                  <textarea class="form-control" id="inputStockdescription" rows="5" placeholder="Describe the stock in detail"></textarea>
              </div>
              
              <div class="col-12">
                  <button type="submit" class="btn btn-primary">Register</button>
              </div>
          </form>
        </div>
      </div>
    </div>
</body>

</html>

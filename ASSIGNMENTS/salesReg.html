<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALES REGISTRATION</title>
    <link rel="stylesheet" href="salesRegistration.css">
</head>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
    }

    .container {
        width: 100%;
        background-color: #ffffff;
        display: flex;
        height: 100vh;
    }

    .sidebar {
        background-color: #2c3e50;
        flex: 2;
        border-right: 2px solid #1a252f;
    }

    .content {
        background-color: #ecf0f1;
        flex: 7;
        padding: 30px;
        overflow-y: auto;

    }

    .input-container {
        display: flex;
        flex-direction: row;
        margin-bottom: 20px;
        column-gap: 100px;

    }

    .customer-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 20px;
        margin-bottom: 20px;
    }

    .item-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
    }

    .sidebar button {
        width: 100%;
        padding: 20px;
        margin-bottom: 10px;
        background-color: #3498db;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: #ffffff;
        font-weight: bold;
        font-size: 14px;
        transition: background-color 0.3s ease;
    }

    .sidebar button:hover {
        background-color: #2980b9;
    }

    .sidebar button a {
        text-decoration: none;
        color: #ffffff;
    }

    h1 {
        color: #2c3e50;
        padding: 2px 300px;
        text-decoration: underline;

    }

    .profile {
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: 20px;

    }
</style>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="profile">
                <div
                    style="width: 80px; height: 80px; border-radius: 50%; background-color: #3498db; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px;">
                </div>
                <p style="font-size: large; margin-left: 15px;color: #ffffff;">Your full name<br>
                    <span style="font-size: smaller;">Your role in the system</span>
                </p> <br><br>
            </div>






            <div>
                <button><a href="dashboard.html">DASHBOARD</a></button>

            </div>
            <div>
                <button><a href="salesRegistration.html">SALES REGISTRATION</a></button>
            </div>
            <div>
                <button><a href="salesReport.html">SALES REPORT</a></button>
            </div>
            <div>
                <button><a href="inventoryManagement.html">INVENTORY MANAGEMENT</a></button>
            </div>
            <div>
                <button><a href="customerManagement.html">CUSTOMER MANAGEMENT</a></button>
            </div>
        </div>
        <div class="content">
            <form action="">
                <!-- SECTION 1-->
                <h1>SALES REGISTRATION</h1>
                <div class="input-container">

                    <div class="input-date">
                        <label for="salesDate">Sales Date:</label>
                        <input type="date">
                    </div>
                    <div>
                        <label for="salesPerson">Sales Person:</label>
                        <select name="salesPerson" id="salesPerson">
                            <option value="">Select Sales Person</option>
                            <option value="john">Melanie</option>
                            <option value="jane">Maria</option>
                            <option value="bob">Komuntale</option>
                        </select>

                    </div>





                </div>
                <br>
                <nbsp>
                    <h1> CUSTOMER DETAILS</h1>
                    <div class="customer-grid">
                        <div class="input-customerName">
                            <label for="customerName">Customer Name</label><br>
                            <input type="text" id="customerName" name="customerName" placeholder="Enter customer name">
                        </div>
                        <div class="input-customerContact">
                            <label for="customerContact">Customer Contact</label><br>
                            <input type="text" id="customerContact" name="customerContact"
                                placeholder="Enter customer contact">
                        </div>
                        <div class="input-customerEmail">
                            <label for="customerEmail">Customer Email</label><br>
                            <input type="email" id="customerEmail" name="customerEmail"
                                placeholder="Enter customer email">
                        </div>
                        <div class="input-customerType">
                            <label for="customerType">Customer Type</label><br>
                            <select name="customerType" id="customerType">
                                <option value="">Select Customer Type</option>
                                <option value="retail">Retail</option>
                                <option value="wholesale">Wholesale</option>
                            </select>
                        </div>
                    </div>
                    <nbsp><br>
                        <h1>ITEMS</h1>
                        <div class="item-grid">
                            <div class="input-itemName">
                                <label for="itemName">Item Name</label><br>
                                <input type="text" id="itemName" name="itemName" placeholder="Enter item name">
                            </div>
                            <div class="input-itemQuantity">
                                <label for="itemQuantity">Item Quantity</label><br>
                                <input type="number" id="itemQuantity" name="itemQuantity"
                                    placeholder="Enter item quantity">
                            </div>
                            <div class="input-itemPrice">
                                <label for="itemPrice">Unit Price</label><br>
                                <input type="number" id="itemPrice" name="itemPrice" placeholder="Enter unit price">
                            </div>
                            <div class="input-itemName">
                                <label for="itemName">Item Name</label><br>
                                <input type="text" id="itemName" name="itemName" placeholder="Enter item name">
                            </div>
                            <div class="input-itemQuantity">
                                <label for="itemQuantity">Item Quantity</label><br>
                                <input type="number" id="itemQuantity" name="itemQuantity"
                                    placeholder="Enter item quantity">
                            </div>
                            <div class="input-itemPrice">
                                <label for="itemPrice">Unit Price</label><br>
                                <input type="number" id="itemPrice" name="itemPrice" placeholder="Enter unit price">
                            </div>


                        </div>
            </form>
        </div>



    </div>

</body>

</html>
